# ============================================================
# AI Agent Platform - 生产环境 Docker Compose
# 使用方式:
#   1. cp docker/.env.prod.example docker/.env.prod  并填写真实密码
#   2. docker compose -f docker-compose.prod.yml up -d
#
# 服务: Backend(Spring Boot) + Frontend(Nginx) + MySQL + Redis
#       + MinIO + Milvus + etcd
# ============================================================

services:
  # ============================================================
  # Backend - Spring Boot (Java 21)
  # 端口: 8080 (容器内)，通过 nginx 代理访问
  # 注意: 镜像由 GitHub Actions 自动构建并推送至 ghcr.io
  #       push main 时自动更新 latest 标签
  # ============================================================
  backend:
    image: ghcr.io/zj669/ai-agent/ai-agent-backend:${IMAGE_TAG:-latest}
    container_name: ai-agent-backend
    environment:
      # 数据源（MySQL）
      PRIMARY_DB_HOST: mysql
      PRIMARY_DB_PORT: 3306
      PRIMARY_DB_NAME: ai_agent
      PRIMARY_DB_USER: ${PRIMARY_DB_USER:-root}
      PRIMARY_DB_PASSWORD: ${PRIMARY_DB_PASSWORD}
      PRIMARY_DB_DRIVER: com.mysql.cj.jdbc.Driver
      PRIMARY_DB_MIN_IDLE: 10
      PRIMARY_DB_MAX_POOL_SIZE: 50
      PRIMARY_DB_IDLE_TIMEOUT: 600000
      PRIMARY_DB_MAX_LIFETIME: 1800000
      PRIMARY_DB_CONNECTION_TIMEOUT: 30000
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_POOL_SIZE: 20
      REDIS_MIN_IDLE_SIZE: 5
      REDIS_IDLE_TIMEOUT: 600000
      REDIS_CONNECT_TIMEOUT: 10000
      REDIS_RETRY_ATTEMPTS: 3
      REDIS_RETRY_INTERVAL: 1500
      REDIS_PING_INTERVAL: 30000
      REDIS_KEEP_ALIVE: "true"
      # Milvus
      MILVUS_ENABLED: "true"
      MILVUS_HOST: ai-agent-milvus
      MILVUS_PORT: 19530
      MILVUS_USERNAME: ""
      MILVUS_PASSWORD: ""
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin123456}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-knowledge-files}
      # 邮件
      MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Auth debug
      AUTH_DEBUG_ENABLED: "false"
      # Spring Profile
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: "8090"
    volumes:
      - backend_logs:/app/logs
    ports:
      - "127.0.0.1:8090:8090"
    networks:
      - ai-agent-network
    restart: unless-stopped

  # ============================================================
  # Frontend - Nginx (React SPA)
  # 端口: 80 → 映射到服务器端口
  # 挂载自定义 nginx.conf，将 backend 代理指向 8090
  # ============================================================
  frontend:
    image: ghcr.io/zj669/ai-agent/ai-agent-frontend:${IMAGE_TAG:-latest}
    container_name: ai-agent-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx.frontend.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai-agent-network
    restart: unless-stopped

  # ============================================================
  # MySQL 8.0 - 主数据库
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ai-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${PRIMARY_DB_PASSWORD}
      MYSQL_DATABASE: ai_agent
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
      --lower_case_table_names=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${PRIMARY_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ai-agent-network
    restart: unless-stopped

  # ============================================================
  # Redis 7 - 缓存/SSE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-agent-network
    restart: unless-stopped

  # ============================================================
  # MinIO - 对象存储
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: ai-agent-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123456}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-agent-network
    restart: unless-stopped

  # ============================================================
  # etcd - Milvus 元数据
  # ============================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ai-agent-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-agent-network
    restart: unless-stopped

  # ============================================================
  # Milvus 2.3 - 向量数据库
  # ============================================================
  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: ai-agent-milvus
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin123456}
    volumes:
      - milvus_data:/var/lib/milvus
      - ./init/milvus/milvus.yaml:/etc/milvus/milvus.yaml:ro
    ports:
      - "${MILVUS_GRPC_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s
    networks:
      - ai-agent-network
    restart: unless-stopped

# ============================================================
# 数据卷
# ============================================================
volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local
  minio_data:
    driver: local
  etcd_data:
    driver: local
  milvus_data:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  ai-agent-network:
    driver: bridge
