# ============================================================
# AI Agent Platform - CI 测试
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run backend tests
        run: mvn test -B

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-agent-foward/package-lock.json

      - name: Install dependencies
        working-directory: ./ai-agent-foward
        run: npm ci

      - name: Type check
        working-directory: ./ai-agent-foward
        run: npm run typecheck

      - name: Lint
        working-directory: ./ai-agent-foward
        run: npm run lint
