# ============================================================
# AI Agent Platform - 镜像构建与发布
# 触发条件:
#   - push 到 main 分支（自动打 latest + 补丁版本）
#   - 发布 GitHub Release（打精确语义化版本标签）
#   - 手动触发 (workflow_dispatch)
#
# 已知坑:
#   GitHub Actions runner 预装了 Docker Hub 凭证。
#   Buildx 推送 ghcr.io 时仍会尝试 Docker Hub 认证（用 runner 的旧凭证），
#   导致 401 insufficient scopes。
#   解决: setup-buildx-action 中使用 config-from-name: '' 清除残留凭证，
#   只使用 login-action 提供的 ghcr.io 凭证。
# ============================================================
name: Build & Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (e.g., v1.2.3)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository_owner }}/ai-agent/backend
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository_owner }}/ai-agent/frontend

jobs:
  # ── Job 1: 确定镜像标签 ───────────────────────────────
  determine-tags:
    name: Determine Image Tags
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tags
        id: meta
        run: |
          TAGS=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            TAGS="${TAG_NAME},latest"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAGS="${{ github.event.inputs.image_tag }},latest"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            SHORT_SHA=${GITHUB_SHA:0:7}
            TIMESTAMP=$(date +%Y%m%d%H%M)
            TAGS="latest,${TIMESTAMP}-${SHORT_SHA}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  # ── Job 2: 构建并推送 Backend ──────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: determine-tags
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # 关键：清除 runner 预装的 Docker Hub 残留凭证
          # 只使用 login-action 提供的 ghcr.io 凭证
          config-from-name: ''

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_BACKEND }}
          tags: type=raw,value=${{ needs.determine-tags.outputs.tags }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ai-agent-interfaces/Dockerfile
          push: true
          tags: ${{ needs.determine-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: MAVEN_OPTS=-Xmx2048m

  # ── Job 3: 构建并推送 Frontend ───────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: determine-tags
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-agent-foward/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # 关键：清除 runner 预装的 Docker Hub 残留凭证
          config-from-name: ''

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_FRONTEND }}
          tags: type=raw,value=${{ needs.determine-tags.outputs.tags }}

      - name: Build frontend
        working-directory: ./ai-agent-foward
        run: |
          npm ci
          VITE_API_BASE_URL=/api npm run build

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./ai-agent-foward
          file: ./ai-agent-foward/Dockerfile.prod
          push: true
          tags: ${{ needs.determine-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
