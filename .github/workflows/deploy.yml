# ============================================================
# AI Agent Platform - 镜像构建与发布
# ============================================================
name: Build & Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (e.g., v1.2.3)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  # Repository-scoped packages (GITHUB_TOKEN can write to these)
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository }}/ai-agent-backend
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository }}/ai-agent-frontend

jobs:
  determine-tags:
    name: Determine Image Tags
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          TAGS=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAGS="${GITHUB_REF#refs/tags/},latest"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="${INPUT_IMAGE_TAG:-latest}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="latest,$(date +%Y%m%d%H%M)-${GITHUB_SHA:0:7}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: determine-tags
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 清除 runner 预装的 Docker Hub 凭证（关键修复）
      - name: Clear Docker Hub credentials
        run: |
          docker logout || true
          echo "Cleared Docker Hub auth from runner"

      - uses: docker/setup-buildx-action@v3

      - name: Check ghcr.io connectivity from runner
        run: |
          echo "=== ghcr.io direct test ==="
          echo "1. Testing ghcr.io v2 API..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ghcr.io/v2/ 2>&1)
          echo "   HTTP status: $STATUS"
          echo "2. Testing docker login directly..."
          echo '${{ secrets.CR_PAT }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>&1 || echo "   docker login FAILED"
          echo "3. Testing Docker pull (Docker Hub)..."
          docker pull alpine:3.19 2>&1 && echo "   ✅ Docker Hub OK" || echo "   ❌ Docker Hub FAILED"
          echo "=== End connectivity test ==="

      - name: Skip login-action (daemon blocks ghcr.io), use build-push inline auth
        run: echo "Using inline credentials in build-push-action instead of login-action"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME_BACKEND }}
          tags: type=raw,value=${{ needs.determine-tags.outputs.tags }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ai-agent-interfaces/Dockerfile
          push: true
          tags: ${{ needs.determine-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: MAVEN_OPTS=-Xmx2048m
          provenance: false
          sbom: false
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}
          registry: ghcr.io

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: determine-tags
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-agent-foward/package-lock.json

      # 清除 runner 预装的 Docker Hub 凭证（关键修复）
      - name: Clear Docker Hub credentials
        run: |
          docker logout || true
          echo "Cleared Docker Hub auth from runner"

      - uses: docker/setup-buildx-action@v3

      - name: Check ghcr.io connectivity from runner
        run: |
          echo "=== ghcr.io direct test ==="
          echo "1. Testing ghcr.io v2 API..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ghcr.io/v2/ 2>&1)
          echo "   HTTP status: $STATUS"
          echo "2. Testing docker login directly..."
          echo '${{ secrets.CR_PAT }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>&1 || echo "   docker login FAILED"
          echo "3. Testing Docker pull (Docker Hub)..."
          docker pull alpine:3.19 2>&1 && echo "   ✅ Docker Hub OK" || echo "   ❌ Docker Hub FAILED"
          echo "=== End connectivity test ==="

      - name: Skip login-action (daemon blocks ghcr.io), use build-push inline auth
        run: echo "Using inline credentials in build-push-action instead of login-action"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME_FRONTEND }}
          tags: type=raw,value=${{ needs.determine-tags.outputs.tags }}

      - name: Build frontend
        working-directory: ./ai-agent-foward
        run: npm ci && VITE_API_BASE_URL=/api npm run build

      - uses: docker/build-push-action@v6
        with:
          context: ./ai-agent-foward
          file: ./ai-agent-foward/Dockerfile.prod
          push: true
          tags: ${{ needs.determine-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}
          registry: ghcr.io
