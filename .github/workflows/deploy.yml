# ============================================================
# AI Agent Platform - 镜像构建与发布
# ============================================================
name: Build & Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (e.g., v1.2.3)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository_owner }}/ai-agent-backend
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository_owner }}/ai-agent-frontend

jobs:
  determine-tags:
    name: Determine Image Tags
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          TAGS=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAGS="${GITHUB_REF#refs/tags/},latest"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAGS="${{ github.event.inputs.image_tag }},latest"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="latest,$(date +%Y%m%d%H%M)-${GITHUB_SHA:0:7}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: determine-tags
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 清除 runner 预装的 Docker Hub 凭证（关键修复）
      - name: Clear Docker Hub credentials
        run: |
          docker logout || true
          echo "Cleared Docker Hub auth from runner"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME_BACKEND }}
          tags: type=raw,value=${{ needs.determine-tags.outputs.tags }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ai-agent-interfaces/Dockerfile
          push: true
          tags: ${{ needs.determine-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: MAVEN_OPTS=-Xmx2048m
          provenance: false
          sbom: false

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: determine-tags
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-agent-foward/package-lock.json

      # 清除 runner 预装的 Docker Hub 凭证（关键修复）
      - name: Clear Docker Hub credentials
        run: |
          docker logout || true
          echo "Cleared Docker Hub auth from runner"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME_FRONTEND }}
          tags: type=raw,value=${{ needs.determine-tags.outputs.tags }}

      - name: Build frontend
        working-directory: ./ai-agent-foward
        run: npm ci && VITE_API_BASE_URL=/api npm run build

      - uses: docker/build-push-action@v6
        with:
          context: ./ai-agent-foward
          file: ./ai-agent-foward/Dockerfile.prod
          push: true
          tags: ${{ needs.determine-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
