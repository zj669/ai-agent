# ============================================================
# AI Agent Platform - 镜像构建与发布
# ============================================================
name: Build & Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (e.g., v1.2.3)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository }}/ai-agent-backend
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository }}/ai-agent-frontend

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to ghcr.io ──────────────────────────────
      # 对于仓库级包（ghcr.io/owner/repo/name），GITHUB_TOKEN 足够
      # 对于用户级包，需使用 classic PAT 并通过 secrets.CR_PAT 传入
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      # ── Backend ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ai-agent-interfaces/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_BACKEND }}:latest
            ${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
          build-args: MAVEN_OPTS=-Xmx2048m
          provenance: false
          sbom: false

      # ── Frontend ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-agent-foward/package-lock.json

      - name: Build Frontend
        working-directory: ./ai-agent-foward
        run: npm ci && VITE_API_BASE_URL=/api npm run build

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./ai-agent-foward
          file: ./ai-agent-foward/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_NAME_FRONTEND }}:latest
            ${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
          build-args: VITE_API_BASE_URL=/api
          provenance: false
          sbom: false
