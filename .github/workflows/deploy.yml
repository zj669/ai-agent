# ============================================================
# AI Agent Platform - 镜像构建与发布
# ============================================================
name: Build & Push Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (e.g., v1.2.3)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository }}/ai-agent-backend
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository }}/ai-agent-frontend

jobs:
  determine-tags:
    name: Determine Image Tags
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          TAGS=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAGS="${GITHUB_REF#refs/tags/},latest"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="${INPUT_IMAGE_TAG:-latest}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="latest,$(date +%Y%m%d%H%M)-${GITHUB_SHA:0:7}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: determine-tags
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 清除 Docker Hub 凭证（daemon 缓存）
      - name: Clear Docker Hub credentials
        run: |
          docker logout docker.io 2>/dev/null || true
          docker logout 2>/dev/null || true
          echo "Cleared Docker auth"

      - uses: docker/setup-buildx-action@v3

      # 深入诊断：Docker daemon 的 ghcr.io 路由问题
      - name: Diagnose Docker daemon ghcr.io routing
        run: |
          echo "=== DNS resolution ==="
          getent hosts ghcr.io 2>/dev/null || nslookup ghcr.io 2>/dev/null || echo "DNS lookup failed"
          echo "=== curl test (no Docker) ==="
          curl -s -o /dev/null -w "curl ghcr.io/v2/ -> HTTP %{http_code}\n" https://ghcr.io/v2/ || echo "curl failed"
          echo "=== Docker pull ghcr.io test ==="
          docker pull ghcr.io/library/alpine:latest 2>&1 && echo "✅ ghcr.io public image pull OK" || echo "❌ ghcr.io pull failed"
          echo "=== Docker info (registry) ==="
          docker info 2>&1 | grep -i 'registry\|mirror\|proxy' || echo "no special registry config"

      # 创建 Docker config.json，直接注入 ghcr.io 凭证
      - name: Create ghcr.io Docker config
        run: |
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.CR_PAT }}" | base64 | tr -d '\n')
          mkdir -p /tmp/docker-config
          cat > /tmp/docker-config/config.json << CONFIG
          {
            "auths": {
              "ghcr.io": {
                "auth": "$AUTH"
              }
            }
          }
          CONFIG
          echo "Created Docker config with ghcr.io credentials"

      - name: Push using custom Docker config
        run: |
          docker buildx build \
            --build-arg MAVEN_OPTS=-Xmx2048m \
            --file ./ai-agent-interfaces/Dockerfile \
            --tag ghcr.io/${{ github.repository }}/ai-agent-backend:latest \
            --tag ghcr.io/${{ github.repository }}/ai-agent-backend:$(date +%Y%m%d%H%M) \
            --push \
            --attest type=provenance,disabled=true \
            --attest type=sbom,disabled=true \
            --config /tmp/docker-config/config.json \
            .

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: determine-tags
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-agent-foward/package-lock.json

      # 清除 Docker Hub 凭证
      - name: Clear Docker Hub credentials
        run: |
          docker logout docker.io 2>/dev/null || true
          docker logout 2>/dev/null || true
          echo "Cleared Docker auth"

      - uses: docker/setup-buildx-action@v3

      # 构建前端
      - name: Build frontend
        working-directory: ./ai-agent-foward
        run: npm ci && VITE_API_BASE_URL=/api npm run build

      # 创建 Docker config.json
      - name: Create ghcr.io Docker config
        run: |
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.CR_PAT }}" | base64 | tr -d '\n')
          mkdir -p /tmp/docker-config
          cat > /tmp/docker-config/config.json << CONFIG
          {
            "auths": {
              "ghcr.io": {
                "auth": "$AUTH"
              }
            }
          }
          CONFIG
          echo "Created Docker config with ghcr.io credentials"

      # 直接用 docker buildx build，带 --config 参数
      - name: Push frontend image using custom Docker config
        run: |
          docker buildx build \
            --file ./ai-agent-foward/Dockerfile.prod \
            --tag ghcr.io/${{ github.repository }}/ai-agent-frontend:latest \
            --tag ghcr.io/${{ github.repository }}/ai-agent-frontend:$(date +%Y%m%d%H%M) \
            --push \
            --attest type=provenance,disabled=true \
            --attest type=sbom,disabled=true \
            --config /tmp/docker-config/config.json \
            ./ai-agent-foward
