version: '3.8'

# ============================================================
# AI Agent Platform - Docker Compose
# 服务: MySQL, Redis, Milvus(向量库), MinIO(对象存储)
# 所有服务均配置账号密码，适用于测试环境部署
# ============================================================

services:
  # ============================================================
  # MySQL 8.0 - 主数据库
  # 账号: root / root123
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ai-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ai_agent
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
      --lower_case_table_names=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-agent-network

  # ============================================================
  # Redis 7 - 缓存/会话/SSE消息队列
  # 密码: redis123
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-agent-network

  # ============================================================
  # MinIO - 对象存储 (知识库文档)
  # 账号: admin / admin123456
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ai-agent-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123456}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-agent-network

  # ============================================================
  # Milvus 2.3 - 向量数据库 (Standalone模式)
  # 账号: root / Milvus123
  # 依赖: etcd + minio
  # ============================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ai-agent-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-agent-network

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: ai-agent-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin123456}
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # Metrics
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-agent-network

# ============================================================
# 数据卷
# ============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  etcd_data:
    driver: local
  milvus_data:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  ai-agent-network:
    driver: bridge
