version: "3.8"

services:
  backend:
    image: eclipse-temurin:21-jre-alpine
    container_name: ai-agent-backend
    working_dir: /app
    restart: unless-stopped
    command:
      - sh
      - -c
      - java $$JAVA_OPTS -Dspring.profiles.active=$${SPRING_PROFILES_ACTIVE:-local} -jar /app/app.jar
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      JAVA_OPTS: ${JAVA_OPTS:-"-Xms512m -Xmx1024m -XX:+UseG1GC"}
      PRIMARY_DB_DRIVER: com.mysql.cj.jdbc.Driver
      PRIMARY_DB_HOST: ${PRIMARY_DB_HOST:-ai-agent-mysql}
      PRIMARY_DB_PORT: ${PRIMARY_DB_PORT:-3306}
      PRIMARY_DB_NAME: ${PRIMARY_DB_NAME:-ai_agent}
      PRIMARY_DB_USER: ${PRIMARY_DB_USER:-root}
      PRIMARY_DB_PASSWORD: ${PRIMARY_DB_PASSWORD:-root123}
      PRIMARY_DB_MIN_IDLE: ${PRIMARY_DB_MIN_IDLE:-5}
      PRIMARY_DB_MAX_POOL_SIZE: ${PRIMARY_DB_MAX_POOL_SIZE:-15}
      PRIMARY_DB_IDLE_TIMEOUT: ${PRIMARY_DB_IDLE_TIMEOUT:-30000}
      PRIMARY_DB_MAX_LIFETIME: ${PRIMARY_DB_MAX_LIFETIME:-28740000}
      PRIMARY_DB_CONNECTION_TIMEOUT: ${PRIMARY_DB_CONNECTION_TIMEOUT:-30000}
      REDIS_HOST: ${REDIS_HOST:-ai-agent-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      REDIS_MIN_IDLE_SIZE: ${REDIS_MIN_IDLE_SIZE:-5}
      REDIS_IDLE_TIMEOUT: ${REDIS_IDLE_TIMEOUT:-30000}
      REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-5000}
      REDIS_RETRY_ATTEMPTS: ${REDIS_RETRY_ATTEMPTS:-3}
      REDIS_RETRY_INTERVAL: ${REDIS_RETRY_INTERVAL:-1000}
      REDIS_PING_INTERVAL: ${REDIS_PING_INTERVAL:-60000}
      REDIS_KEEP_ALIVE: ${REDIS_KEEP_ALIVE:-true}
      AUTH_DEBUG_ENABLED: "false"
      AUTH_DEBUG_HEADER_NAME: ${AUTH_DEBUG_HEADER_NAME:-debug-user}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://ai-agent-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-admin123456}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-knowledge-files}
      MILVUS_ENABLED: ${MILVUS_ENABLED:-true}
      MILVUS_HOST: ${MILVUS_HOST:-ai-agent-milvus}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MILVUS_USERNAME: ${MILVUS_USERNAME:-}
      MILVUS_PASSWORD: ${MILVUS_PASSWORD:-}
      ASYNC_TASK_CORE_SIZE: ${ASYNC_TASK_CORE_SIZE:-5}
      ASYNC_TASK_MAX_SIZE: ${ASYNC_TASK_MAX_SIZE:-10}
      ASYNC_TASK_QUEUE_CAPACITY: ${ASYNC_TASK_QUEUE_CAPACITY:-100}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      EMBEDDING_NUM_CTX: ${EMBEDDING_NUM_CTX:-1024}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-aiagent-your-secret-key-change-in-production-please-make-it-long-enough}
    volumes:
      - ./backend/ai-agent-interfaces-1.0.0-SNAPSHOT.jar:/app/app.jar:ro
      - ./runtime/backend-data:/app/data
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - ai-agent-network

  frontend:
    image: nginx:1.27-alpine
    container_name: ai-agent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./frontend-dist:/usr/share/nginx/html:ro
      - ./ai-agent-foward/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ai-agent-network

networks:
  ai-agent-network:
    external: true
    name: ${AI_AGENT_DOCKER_NETWORK:-docker_ai-agent-network}
