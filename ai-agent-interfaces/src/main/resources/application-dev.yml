# ==========================================
# Dev 测试环境配置 (Key-Value 格式)
# ==========================================

# 主数据库配置 (MySQL)
PRIMARY_DB_DRIVER: com.mysql.cj.jdbc.Driver
PRIMARY_DB_HOST: ${PRIMARY_DB_HOST:localhost}
PRIMARY_DB_PORT: ${PRIMARY_DB_PORT:13306}
PRIMARY_DB_NAME: ${PRIMARY_DB_NAME:ai_agent}
PRIMARY_DB_USER: ${PRIMARY_DB_USER:root}
PRIMARY_DB_PASSWORD: ${PRIMARY_DB_PASSWORD:}
PRIMARY_DB_MIN_IDLE: 5
PRIMARY_DB_MAX_POOL_SIZE: 15
PRIMARY_DB_IDLE_TIMEOUT: 30000
PRIMARY_DB_MAX_LIFETIME: 28740000
PRIMARY_DB_CONNECTION_TIMEOUT: 30000

# PgVector数据库配置 (PostgreSQL)
PGVECTOR_DB_DRIVER: org.postgresql.Driver
PGVECTOR_DB_HOST: ${PGVECTOR_DB_HOST:localhost}
PGVECTOR_DB_PORT: ${PGVECTOR_DB_PORT:5432}
PGVECTOR_DB_NAME: ${PGVECTOR_DB_NAME:postgres}
PGVECTOR_DB_USER: ${PGVECTOR_DB_USER:postgres}
PGVECTOR_DB_PASSWORD: ${PGVECTOR_DB_PASSWORD:}
PGVECTOR_DB_MIN_IDLE: 5
PGVECTOR_DB_MAX_POOL_SIZE: 15
PGVECTOR_DB_IDLE_TIMEOUT: 30000
PGVECTOR_DB_MAX_LIFETIME: 28740000
PGVECTOR_DB_CONNECTION_TIMEOUT: 30000


# Embedding配置
EMBEDDING_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode
EMBEDDING_ENDPOINT: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
EMBEDDING_MODEL: text-embedding-v4
EMBEDDING_NUM_CTX: 1,024

# Agent配置
AGENT_AUTO_CONFIG_ENABLED: true
AGENT_CLIENT_IDS: 6001,3101,3102,3103,3104

# 降级模型配置
FALLBACK_ENABLED: true
FALLBACK_BASE_URL: https://globalai.vip
FALLBACK_API_KEY: ${FALLBACK_API_KEY:}
FALLBACK_MODEL: gpt-3.5-turbo
FALLBACK_TEMPERATURE: 0.7
FALLBACK_MAX_TOKENS: 2000

# 邮件配置
MAIL_HOST: smtp.qq.com
MAIL_PORT: 465
MAIL_USERNAME: ${MAIL_USERNAME:}
MAIL_PASSWORD: ${MAIL_PASSWORD:}

# Redis配置
REDIS_HOST: ${REDIS_HOST:127.0.0.1}
REDIS_PORT: ${REDIS_PORT:6379}
REDIS_POOL_SIZE: 10
REDIS_PASSWORD: ${REDIS_PASSWORD:}
REDIS_MIN_IDLE_SIZE: 5
REDIS_IDLE_TIMEOUT: 30000
REDIS_CONNECT_TIMEOUT: 5000
REDIS_RETRY_ATTEMPTS: 3
REDIS_RETRY_INTERVAL: 1000
REDIS_PING_INTERVAL: 60000
REDIS_KEEP_ALIVE: true

# 认证配置
AUTH_DEBUG_ENABLED: true
AUTH_DEBUG_HEADER_NAME: debug-user
