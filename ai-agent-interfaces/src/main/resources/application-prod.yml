# ============================================================
# AI Agent Platform - 生产环境配置
# Profile: prod
# 用途: 生产环境部署配置，强制 HTTPS，优化性能和安全性
# ============================================================
# ⚠️ 数据源配置必须与 application.yml 保持结构一致（dynamic-datasource 依赖此结构）
# ⚠️ 所有密码必须通过环境变量注入，禁止硬编码
# ============================================================

server:
  port: 8080  # 容器内保持 8080，TLS 在 Ingress/Kubernetes 层处理
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: strict

spring:
  # ============================================================
  # 数据源配置（必须与 application.yml 结构一致）
  # 使用 dynamic-datasource 的嵌套结构 PRIMARY_DB_* 环境变量
  # ============================================================
  datasource:
    dynamic:
      datasource:
        primary:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${PRIMARY_DB_HOST:localhost}:${PRIMARY_DB_PORT:3306}/${PRIMARY_DB_NAME:ai_agent}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia%2FShanghai&allowPublicKeyRetrieval=true
          username: ${PRIMARY_DB_USER}
          password: ${PRIMARY_DB_PASSWORD}
          hikari:
            minimum-idle: ${PRIMARY_DB_MIN_IDLE:10}
            maximum-pool-size: ${PRIMARY_DB_MAX_POOL_SIZE:50}
            idle-timeout: ${PRIMARY_DB_IDLE_TIMEOUT:600000}
            max-lifetime: ${PRIMARY_DB_MAX_LIFETIME:1800000}
            pool-name: PrimaryHikariCP
            connection-timeout: ${PRIMARY_DB_CONNECTION_TIMEOUT:30000}
            connection-test-query: SELECT 1

  # 日志配置 (生产环境)
  logging:
    level:
      root: INFO
      com.zj.aiagent: INFO
      org.springframework: WARN
    file:
      name: /app/logs/application.log
      max-size: 100MB
      max-history: 30
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
      file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT 配置 (生产环境)
jwt:
  secret: ${JWT_SECRET}  # 必须从环境变量读取，禁止硬编码
  expiration: 7200000  # 2 hours

# 安全配置（适用于 Spring Security，如有）
security:
  require-ssl: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# 监控配置 (生产环境)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# 邮件配置 (生产环境)
mail:
  host: ${MAIL_HOST}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}

# ============================================================
# 以下配置与 application.yml 共享变量，保持一致
# ============================================================

# Redis 配置（Redisson）
redis:
  sdk:
    config:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      pool-size: ${REDIS_POOL_SIZE:20}
      min-idle-size: ${REDIS_MIN_IDLE_SIZE:5}
      idle-timeout: ${REDIS_IDLE_TIMEOUT:600000}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:10000}
      retry-attempts: ${REDIS_RETRY_ATTEMPTS:3}
      retry-interval: ${REDIS_RETRY_INTERVAL:1500}
      ping-interval: ${REDIS_PING_INTERVAL:30000}
      keep-alive: ${REDIS_KEEP_ALIVE:true}

# Milvus 配置
milvus:
  enabled: ${MILVUS_ENABLED:true}
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  username: ${MILVUS_USERNAME:}
  password: ${MILVUS_PASSWORD:}

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:knowledge-files}

# 认证调试模式 (生产环境必须关闭)
auth:
  debug:
    enabled: false

# 限流配置 (生产环境)
rate-limit:
  email:
    max-requests: 1
    window-seconds: 60
  login-failure:
    max-requests: 5
    window-seconds: 900
  ip:
    max-requests: 100
    window-seconds: 60
