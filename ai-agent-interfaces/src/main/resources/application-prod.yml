# 生产环境配置
# Profile: prod
# 用途: 生产环境部署配置,强制 HTTPS,优化性能和安全性

server:
  port: 8443  # HTTPS 端口
  # HTTPS 配置 (需要提供证书)
  ssl:
    enabled: true
    key-store: classpath:keystore/server.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: server
  # HSTS (HTTP Strict Transport Security)
  # 强制浏览器使用 HTTPS 访问
  servlet:
    session:
      cookie:
        secure: true  # Cookie 仅通过 HTTPS 传输
        http-only: true  # 防止 JavaScript 访问 Cookie
        same-site: strict  # 防止 CSRF 攻击

spring:
  # 数据源配置 (生产环境)
  datasource:
    primary:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_agent}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      hikari:
        maximum-pool-size: 50  # 生产环境增加连接池大小
        minimum-idle: 10
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        pool-name: PrimaryHikariPool

  # Redis 配置 (生产环境)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # 日志配置 (生产环境)
  logging:
    level:
      root: INFO
      com.zj.aiagent: INFO
      org.springframework: WARN
    file:
      name: /var/log/ai-agent/application.log
      max-size: 100MB
      max-history: 30
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
      file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT 配置 (生产环境)
jwt:
  secret: ${JWT_SECRET}  # 必须从环境变量读取,不能硬编码
  expiration: 7200000  # 2 小时 (配合 Refresh Token 使用)

# 安全配置
security:
  # HTTPS 强制
  require-ssl: true
  # HSTS 配置
  hsts:
    enabled: true
    max-age: 31536000  # 1 年
    include-subdomains: true
    preload: true

# 监控配置 (生产环境)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# 邮件配置 (生产环境)
mail:
  host: ${MAIL_HOST}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true

# Milvus 配置 (生产环境)
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}

# MinIO 配置 (生产环境)
minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET:ai-agent}

# 认证调试模式 (生产环境必须关闭)
auth:
  debug:
    enabled: false

# 限流配置 (生产环境)
rate-limit:
  email:
    max-requests: 1
    window-seconds: 60
  login-failure:
    max-requests: 5
    window-seconds: 900
  ip:
    max-requests: 100
    window-seconds: 60

# CORS 配置 (生产环境必须配置具体域名)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
